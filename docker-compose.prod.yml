services:
  auth:
    container_name: dolcelina-content-microservice-prod
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION:-20.13.1}
    image: content-microservice:latest
    restart: unless-stopped
    init: true
    env_file:
      - .env
    environment:
      NODE_ENV: production
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const net=require('net'); const socket=net.connect({host:'127.0.0.1',port:3202},()=>{socket.end();process.exit(0);}); socket.on('error',()=>process.exit(1)); setTimeout(()=>process.exit(1),5000);\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    ports:
      - "${PORT:-3203}:3203"
    volumes:
      - shared-tokens:/app/shared-tokens
    networks:
      - ms-network

networks:
  ms-network:
    external: true

volumes:
  shared-tokens:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PROJECT_DOCKER_SHARED_ROUTE}
